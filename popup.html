<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Facebook Friends Reader</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }
    h2 { color: #1877f2; margin: 0 0 12px; }
    button {
      background: #1877f2;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      margin-bottom: 8px;
    }
    button:hover { background: #1565c0; }
    #openBtn { background: #42b72a; }
    #openBtn:hover { background: #36a420; }
    #status { margin-top: 12px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <h2>👥 Facebook Friends</h2>
  <button id="readBtn">📥 Read Friends from Facebook</button>
  <button id="openBtn">🚀 Open Friends App</button>
  <div id="status">Click Read while on Facebook!</div>
  <script src="popup.js"></script>
</body>
</html>
