<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Facebook Friends Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px; padding: 16px;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }
    h2 { color: #1877f2; margin-bottom: 4px; font-size: 17px; }
    .sub { color: #777; font-size: 11px; margin-bottom: 14px; }
    button {
      color: white; border: none; padding: 12px;
      border-radius: 8px; cursor: pointer;
      width: 100%; font-size: 14px;
      margin-bottom: 8px; font-weight: bold;
      transition: background 0.2s;
    }
    #readBtn { background: #1877f2; }
    #readBtn:hover:not(:disabled) { background: #1565c0; }
    #readBtn:disabled { background: #9cb8f5; cursor: not-allowed; }
    #openBtn { background: #42b72a; }
    #openBtn:hover:not(:disabled) { background: #36a420; }
    #openBtn:disabled { background: #bbb; cursor: not-allowed; }
    #counter {
      background: white; border-radius: 10px;
      padding: 14px; text-align: center;
      margin-bottom: 10px;
      border: 2px solid #1877f2;
      display: none;
    }
    #friendCount {
      font-size: 42px; font-weight: bold;
      color: #1877f2; line-height: 1;
    }
    #counter p { font-size: 11px; color: #888; margin-top: 4px; }
    #progressBar {
      width: 100%; background: #ddd;
      border-radius: 4px; height: 6px;
      margin-bottom: 10px; display: none;
      overflow: hidden;
    }
    #progressFill {
      height: 6px;
      background: linear-gradient(90deg, #1877f2, #42b72a);
      border-radius: 4px;
      animation: slide 1.5s ease-in-out infinite;
      width: 40%;
    }
    @keyframes slide {
      0%   { margin-left: 0%; }
      100% { margin-left: 60%; }
    }
    #status {
      font-size: 12px; color: #555;
      text-align: center; min-height: 32px;
      line-height: 1.6;
    }
    .tip {
      background: #fff3cd; border-radius: 6px;
      padding: 8px 10px; font-size: 11px;
      color: #856404; margin-bottom: 10px;
      display: none; line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>👥 Facebook Friends Reader</h2>
  <p class="sub">Automatically fetches your complete friends list!</p>

  <div id="counter">
    <div id="friendCount">0</div>
    <p>friends found so far</p>
  </div>

  <div id="progressBar"><div id="progressFill"></div></div>

  <div class="tip" id="tip">
    ⚠️ Keep this popup open and don't click anything on Facebook while fetching!
  </div>

  <button id="readBtn">▶️ Fetch All Friends</button>
  <button id="openBtn" disabled>🚀 Open Friends App</button>

  <div id="status">Go to facebook.com/friends/list first!</div>

  <script src="popup.js"></script>
</body>
</html>
